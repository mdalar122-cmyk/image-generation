<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Nano Banana 2 - GitHub Edition</title>
    <style>
        body { background: #000; color: #00ff88; font-family: 'Courier New', monospace; text-align: center; padding: 40px; margin: 0; }
        .container { border: 1px solid #222; padding: 30px; border-radius: 15px; background: #0a0a0a; display: inline-block; min-width: 350px; }
        h1 { margin-bottom: 5px; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 20px; }
        input { background: #111; border: 1px solid #333; color: #fff; padding: 12px; width: 250px; border-radius: 5px; outline: none; }
        button { background: #00ff88; color: #000; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; border-radius: 5px; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        #result-area { margin-top: 30px; }
        img { max-width: 100%; border-radius: 10px; border: 1px solid #333; display: none; }
        .loading { display: none; color: #ffcc00; margin-top: 15px; }
    </style>
</head>
<body>

    <h1>🍌 NANO BANANA 2</h1>
    <p class="subtitle">GitHub Güvenli & Sınırsız Görsel Oluşturucu</p>

    <div class="container">
        <input type="text" id="prompt" placeholder="Örn: sonic, space, neon city...">
        <button onclick="draw()">OLUŞTUR</button>
        <div id="loader" class="loading">Görsel getiriliyor...</div>
    </div>

    <div id="result-area">
        <img id="outputImg" src="" alt="Sonuç">
    </div>

    <script>
        function draw() {
            const prompt = document.getElementById('prompt').value;
            const img = document.getElementById('outputImg');
            const loader = document.getElementById('loader');

            if(!prompt) return alert("Bir şeyler yazmalısın!");

            // Arayüzü güncelle
            loader.style.display = "block";
            img.style.display = "none";

            // GitHub'da sorun çıkarmayacak en hızlı görsel kaynağı
            // Unsplash kaynağını kullanarak prompt'a göre görsel çeker
            const finalUrl = `https://unsplash.com{encodeURIComponent(prompt)}&sig=${Math.random()}`;

            img.onload = function() {
                loader.style.display = "none";
                img.style.display = "inline-block";
            };

            img.onerror = function() {
                loader.innerText = "Hata! Tekrar deniyor...";
                setTimeout(draw, 1000); // Hata olursa 1 sn sonra tekrar dene
            };

            img.src = finalUrl;
        }
    </script>
</body>
</html>

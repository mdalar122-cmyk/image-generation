<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Nano Banana 2 - Final Fix</title>
    <style>
        body { background: #000; color: #00ff88; font-family: 'Courier New', monospace; text-align: center; padding: 40px; margin: 0; }
        .box { border: 2px solid #222; padding: 25px; border-radius: 15px; background: #0a0a0a; display: inline-block; }
        input { background: #111; border: 1px solid #00ff88; color: #fff; padding: 12px; width: 250px; border-radius: 5px; outline: none; }
        button { background: #00ff88; color: #000; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        #res-container { margin-top: 30px; min-height: 300px; }
        img { max-width: 90%; border-radius: 10px; border: 2px solid #333; display: none; margin: 0 auto; }
        .msg { color: #888; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <h1>🍌 NANO BANANA 2</h1>
    
    <div class="box">
        <input type="text" id="p" placeholder="Örn: sonic, car, neon...">
        <button onclick="go()">OLUŞTUR</button>
        <div id="m" class="msg">Kelimeyi yaz ve butona bas.</div>
    </div>

    <div id="res-container">
        <img id="i" src="" alt="Sonuç">
    </div>

    <script>
        function go() {
            const prompt = document.getElementById('p').value;
            const img = document.getElementById('i');
            const msg = document.getElementById('m');

            if(!prompt) return;

            msg.innerText = "Görsel taranıyor...";
            img.style.display = "none";

            // Bu kaynak (loremflickr) çok daha stabil ve hızlıdır, API anahtarı istemez
            const url = `https://loremflickr.com{encodeURIComponent(prompt)}?lock=${Math.floor(Math.random() * 1000)}`;

            img.src = url;

            img.onload = function() {
                msg.innerText = "Tamam!";
                img.style.display = "block";
            };

            img.onerror = function() {
                msg.innerText = "Bağlantı hatası, tekrar deneniyor...";
                setTimeout(go, 2000); 
            };
        }
    </script>
</body>
</html>
